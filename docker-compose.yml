services:
  train:
    build:
      context: .
      dockerfile: Dockerfile
    image: bob-train:latest
    container_name: bob-train
    # Publish gRPC port so Unity Editor on the Mac host can reach mlagents-learn.
    # network_mode: host only works on Linux; Docker Desktop Mac needs explicit ports.
    ports:
      - "5004:5004"
    volumes:
      - ./config:/app/config:ro
      - ./python:/app/python:ro
      - ./results:/app/results
      - ./summaries:/app/summaries
    working_dir: /app
    stdin_open: true
    tty: true
    # Override at runtime, e.g.:
    # docker compose run --rm train mlagents-learn config/bob_free_throw.yaml --run-id=bob-v0
    command: ["mlagents-learn", "--help"]
