name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.12"
          cache: pip
          cache-dependency-path: python/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r python/requirements-dev.txt

      - name: Run pytest
        working-directory: python
        run: pytest tests/ -v --cov=scripts --cov-report=term-missing

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/

      - name: Validate bootstrap
        working-directory: terraform/bootstrap
        run: |
          terraform init -backend=false
          terraform validate
          tflint --init
          tflint

      - name: Validate dev environment
        working-directory: terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate
          tflint --init
          tflint

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t bob-train .

      - name: Verify mlagents-learn
        run: docker run --rm bob-train mlagents-learn --help

