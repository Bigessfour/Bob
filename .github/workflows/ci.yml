name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.10.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: 3.10.12
          cache: pip
          cache-dependency-path: python/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r python/requirements-dev.txt

      - name: Run pytest
        working-directory: python
        run: |
          PYTHONPATH=scripts:rag pytest tests/ -v --cov=scripts --cov-report=term-missing -m "not rag"
          PYTHONPATH=scripts pytest tests/test_plot_rewards.py -q --cov=plot_rewards --cov-report=term-missing --cov-fail-under=70

  rag:
    name: RAG Index Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.10.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: 3.10.12
          cache: pip
          cache-dependency-path: |
            python/requirements-dev.txt
            python/requirements-rag.txt

      - name: Install dependencies
        run: |
          pip install -r python/requirements-dev.txt
          pip install -r python/requirements-rag.txt

      - name: Run RAG pytest
        working-directory: python
        run: pytest tests/test_rag.py -v -m rag

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.5.7

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/

      - name: Validate bootstrap
        working-directory: terraform/bootstrap
        run: |
          terraform init -backend=false
          terraform validate
          tflint --init
          tflint

      - name: Validate dev environment
        working-directory: terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate
          tflint --init
          tflint

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build image
        run: docker build -t bob-train .

      - name: Verify mlagents-learn
        run: docker run --rm bob-train mlagents-learn --help

  # TODO (Week 3): Portfolio static site deploy to S3 + CloudFront invalidation
  # - aws s3 sync docs/portfolio-site/ s3://$SITE_BUCKET/
  # - aws cloudfront create-invalidation ...
